<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הפתקים שלי בענן</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .note-item {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: right;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .delete-btn {
            background-color: #dc3545;
            padding: 6px 12px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background-color: #bd2130;
        }
        .status-msg {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>☁️ הפתקים שלי בענן</h1>
        
        <div class="input-area">
            <input type="text" id="noteInput" placeholder="כתוב פתק חדש...">
            <button onclick="addNote()">הוסף</button>
        </div>

        <div id="notesList" class="notes-list">
            <p class="status-msg">טוען פתקים מהענן...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://0ekl5z0y50.execute-api.us-east-1.amazonaws.com/prod/notes';

        // 1. טעינת פתקים (GET)
        function loadNotes() {
            fetch(API_URL)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(notes => {
                    const notesList = document.getElementById('notesList');
                    notesList.innerHTML = '';
                    
                    if (notes.length === 0) {
                        notesList.innerHTML = '<p class="status-msg">אין פתקים בענן. מצאתם זמן להוסיף אחד!</p>';
                        return;
                    }

                    notes.forEach(note => {
                        const noteText = note.title || note.content || 'פתק ללא תוכן';
                        const idToDelete = note.taskId || note.id;
                        const item = document.createElement('div');
                        item.className = 'note-item';
                        item.innerHTML = `
                            <span>${noteText}</span>
                            <button class="delete-btn" onclick="deleteNote('${idToDelete}')">מחק</button>
                        `;
                        notesList.appendChild(item);
                    });
                })
                .catch(err => {
                    document.getElementById('notesList').innerHTML = '<p class="status-msg" style="color:red;">שגיאה בטעינת הנתונים</p>';
                });
        }

        // 2. הוספת פתק (POST)
        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            if (!text) return;

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: text })
            })
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(() => {
                input.value = '';
                loadNotes();
            })
            .catch(err => {
                alert('שגיאה בשמירת הפתק בענן');
            });
        }

        // 3. מחיקת פתק אמיתית (DELETE)
        function deleteNote(taskId) {
            fetch(API_URL, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId: taskId })
            })
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(() => {
                loadNotes(); // רענון אוטומטי של הרשימה לאחר המחיקה
            })
            .catch(err => {
                alert('שגיאה במחיקת הפתק מהענן');
            });
        }

        window.onload = loadNotes;
    </script>
</body>
</html>
